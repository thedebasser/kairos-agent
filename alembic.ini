# Kairos Agent — Alembic configuration.
#
# Phase 4: added Alembic for managed schema migrations.
# The actual database URL is injected at runtime from Settings
# (see alembic/env.py).

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Use async engine for migrations (asyncpg driver)
# URL is overridden in env.py from kairos.config.get_settings()
sqlalchemy.url = postgresql+asyncpg://kairos:kairos@localhost:5432/kairos

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
