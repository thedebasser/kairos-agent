# Kairos Eval — Curated Test Cases
#
# Each entry defines a ConceptBrief (or the fields to construct one) plus
# the expected validation outcomes.  The eval harness loads this file with
# ``EvalCase.load_suite()`` and runs the pipeline in eval mode.
#
# Finding 6.2: "No Eval Dataset or Regression Testing Framework"

cases:

  # ── Ball Pit ──────────────────────────────────────────────────────────

  - id: "bp-overflow-01"
    category: "ball_pit"
    title: "Rainbow Ball Pit Overflow"
    visual_brief: >
      Hundreds of colourful balls drop into a tall glass container,
      bouncing and piling up until the container overflows in a
      satisfying cascade of colour.
    hook_text: "Watch it overflow"
    body_count_initial: 5
    body_count_max: 300
    interaction_type: "bounce_accumulate"
    colour_palette: ["#FF6B6B", "#4ECDC4", "#45B7D1", "#96CEB4", "#FFEAA7"]
    background_colour: "#1a1a2e"
    seed: 42
    expected:
      validation_passes: true
      min_checks_passed: 6
      must_pass_checks:
        - "has_video_stream"
        - "resolution_check"
        - "duration_range"
        - "fps_check"

  - id: "bp-neon-02"
    category: "ball_pit"
    title: "Neon Ball Drop Party"
    visual_brief: >
      Glowing neon balls rain from the sky into a deep pit,
      each bounce sending out a tiny pulse of light. Balls accumulate
      rapidly creating a dense, vibrant sea of colour.
    hook_text: "It never stops"
    body_count_initial: 10
    body_count_max: 250
    interaction_type: "bounce_accumulate"
    colour_palette: ["#FF00FF", "#00FFFF", "#FF6600", "#33FF33", "#FFFF00"]
    background_colour: "#0a0a0a"
    seed: 101
    expected:
      validation_passes: true
      min_checks_passed: 6
      must_pass_checks:
        - "has_video_stream"
        - "duration_range"

  - id: "bp-tiny-03"
    category: "ball_pit"
    title: "Tiny Micro Ball Fountain"
    visual_brief: >
      Thousands of tiny micro-balls erupt from a central fountain,
      arcing outward and collecting in a growing mound that slowly
      spreads across the screen.
    hook_text: "So many balls"
    body_count_initial: 20
    body_count_max: 500
    interaction_type: "bounce_accumulate"
    colour_palette: ["#E8D5B7", "#F2A65A", "#F58F29", "#D45113", "#772F1A"]
    background_colour: "#1a1a2e"
    seed: 202
    expected:
